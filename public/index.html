<!DOCTYPE html>
<html>
<head>
  <title>RPS Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎮 Rock Paper Scissors</h1>

    <!-- 👤 Player Name -->
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="setName()">Set Name</button>

    <br><br>

    <!-- 🎮 Create Game -->
    <button onclick="createGame()">Create Game</button>

    <br><br>

    <!-- 🔗 Join Game -->
    <input id="gameIdInput" placeholder="Enter Game ID">
    <button onclick="joinGame()">Join Game</button>

    <!-- 📢 Status -->
    <h2 id="status"></h2>

    <!-- 🧮 Score -->
    <h3 id="score"></h3>

    <!-- 🎯 Game Buttons -->
    <div id="game" class="buttons" style="display:none;">
      <button onclick="sendMove('rock')">🪨 Rock</button>
      <button onclick="sendMove('paper')">📄 Paper</button>
      <button onclick="sendMove('scissors')">✂️ Scissors</button>
    </div>
  </div>

  <!-- ✅ Socket.IO CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- ✅ Your Script -->
  <script src="script.js"></script>

</body>
</html>
